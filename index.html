    // دالة الاتصال بالخادم
    const apiCall = async (action, payload = {}) => {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...payload })
        });
        return await response.json();

        console.error("API Error:", error);
        return { success: false, error: error.message };
      }

    // --- مكون الأنيميشن الذكي (بديل Framer Motion) ---
    function FadeInWhenVisible({ children, delay = 0, className = "" }) {
      const [isVisible, setIsVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(domRef.current);
            }
          });
        }, { threshold: 0.1 });
        
        if (domRef.current) observer.observe(domRef.current);
        return () => { if (domRef.current) observer.unobserve(domRef.current); };
      }, []);

      return (
        <div
          ref={domRef}
          className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-12 scale-95'} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    }

    // --- STREAMING_CHUNK:Main App Structure ---

      const [theme, setTheme] = useState('dark');
      const [lang, setLang] = useState('ar');
      const [currentPage, setCurrentPage] = useState('home');
      const [user, setUser] = useState(null);
      const [viewedManifestData, setViewedManifestData] = useState(null);

      const isRTL = lang === 'ar';

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const manifestId = params.get('manifest');
        if (manifestId) fetchManifest(manifestId);
      }, []);

      useEffect(() => {
        document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.classList.toggle('light', theme === 'light');
        document.body.className = theme === 'dark' ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900';
      }, [theme, lang, isRTL]);

      const toggleTheme = () => setTheme(theme === 'dark' ? 'light' : 'dark');
      const toggleLang = () => setLang(lang === 'ar' ? 'en' : 'ar');

      const fetchManifest = async (id) => {
        const res = await apiCall('getManifest', { manifestId: id });
        if (res.success) {
          setViewedManifestData({ id, ...res.payload });
          setCurrentPage('view-manifest');
        } else {
          alert('الكشف غير موجود أو تم حذفه.');

        }

        setCurrentPage(page);
        window.scrollTo(0, 0);
      };

            {currentPage === 'driver-dashboard' && <DriverDashboard t={t} user={user} onManifestCreated={(data) => {
              setViewedManifestData(data);
              setCurrentPage('view-manifest');

            {currentPage === 'view-manifest' && viewedManifestData && (

            <WhatsAppButton />

    // --- STREAMING_CHUNK:Booking Form Logic ---
    function BookingForm({ t }) {
      const [status, setStatus] = useState('idle');
      const [formData, setFormData] = useState({ mainName: '', mobile: '', passengers: [{ name: '', passport: '', nationality: 'saudi' }] });

      const addPassenger = () => setFormData(p => ({ ...p, passengers: [...p.passengers, { name: '', passport: '', nationality: 'saudi' }] }));
      const removePassenger = (i) => formData.passengers.length > 1 && setFormData(p => ({ ...p, passengers: p.passengers.filter((_, idx) => idx !== i) }));
      const updatePassenger = (i, field, val) => { const newP = [...formData.passengers]; newP[i][field] = val; setFormData({ ...formData, passengers: newP }); };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setStatus('loading');
        
        const res = await apiCall('book', { payload: formData });
        
        if (res.success) {
          setStatus('success');
          setFormData({ mainName: '', mobile: '', passengers: [{ name: '', passport: '', nationality: 'saudi' }] });
          setTimeout(() => setStatus('idle'), 5000);
        } else {
          setStatus('error');
          alert('حدث خطأ أثناء الحجز، يرجى المحاولة لاحقاً وتأكد من رابط السكريبت');
        }
      };

      if (status === 'success') {
        return (
           <div className="flex flex-col items-center justify-center py-16 text-center animate-fade-in">
             <div className="w-24 h-24 bg-green-900/30 rounded-full flex items-center justify-center mb-6 border border-green-500/30">
               <CheckCircle size={48} className="text-green-400" />
             </div>
             <h3 className="text-3xl font-bold text-green-400 mb-4">{t.bookingSuccess}</h3>
             <p className="text-gray-400 text-lg">سيتواصل معك فريقنا في أقرب وقت لتأكيد التفاصيل.</p>
           </div>
        );
      }

      return (
        <form onSubmit={handleSubmit} className="space-y-8 animate-fade-in">
          <div className="grid md:grid-cols-2 gap-6">
            <div>
               <label className="block text-sm font-bold mb-2 text-gray-300">{t.customerName}</label>
               <input required type="text" value={formData.mainName} onChange={e => setFormData({...formData, mainName: e.target.value})} className="w-full p-4 text-lg rounded-xl bg-gray-900 border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-white" placeholder="الاسم الكامل" />
            </div>
            <div>
               <label className="block text-sm font-bold mb-2 text-gray-300">{t.mobile}</label>
               <input required type="tel" value={formData.mobile} onChange={e => setFormData({...formData, mobile: e.target.value})} className="w-full p-4 text-lg rounded-xl bg-gray-900 border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-white" placeholder="05XXXXXXXX" dir="ltr" />
            </div>
          </div>
          
          <div className="bg-gray-900/50 p-6 md:p-8 rounded-2xl border border-gray-700 shadow-inner">
            <div className="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
               <h4 className="font-bold text-xl flex items-center gap-3 text-white"><Users size={24} className="text-blue-500"/> {t.passengers}</h4>
               <button type="button" onClick={addPassenger} className="text-sm bg-blue-900/40 hover:bg-blue-800/60 text-blue-300 px-5 py-2.5 rounded-full flex items-center gap-2 transition-colors font-bold border border-blue-800/50">
                  <Plus size={18} /> {t.addPassenger}
               </button>
            </div>
            
            <div className="space-y-4">
               {formData.passengers.map((p, index) => (
                 <div key={index} className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-sm animate-slide-up">
                   <div className="md:col-span-4">
                     <label className="block text-xs font-bold mb-2 text-gray-400">{t.passenger} {index + 1}</label>
                     <input required type="text" placeholder="الاسم" value={p.name} onChange={e => updatePassenger(index, 'name', e.target.value)} className="w-full p-3 rounded-lg bg-gray-900 border border-gray-600 focus:border-blue-500 outline-none text-white" />
                   </div>
                   <div className="md:col-span-4">
                     <label className="block text-xs font-bold mb-2 text-gray-400">{t.passport}</label>
                     <input type="text" placeholder="رقم الهوية" value={p.passport} onChange={e => updatePassenger(index, 'passport', e.target.value)} className="w-full p-3 rounded-lg bg-gray-900 border border-gray-600 focus:border-blue-500 outline-none text-white" />
                   </div>
                   <div className="md:col-span-3">
                     <label className="block text-xs font-bold mb-2 text-gray-400">{t.nationality}</label>
                     <select value={p.nationality} onChange={e => updatePassenger(index, 'nationality', e.target.value)} className="w-full p-3 rounded-lg bg-gray-900 border border-gray-600 focus:border-blue-500 outline-none text-white">
                       <option value="saudi">{t.saudi}</option><option value="egyptian">{t.egyptian}</option><option value="other">{t.other}</option>
                     </select>
                   </div>
                   <div className="md:col-span-1 flex justify-center pb-1">
                     {formData.passengers.length > 1 && <button type="button" onClick={() => removePassenger(index)} className="p-3 text-red-400 hover:text-red-300 hover:bg-red-900/30 rounded-lg transition-colors"><Trash2 size={20} /></button>}
                   </div>
                 </div>
               ))}
            </div>
          </div>
          
          <button type="submit" disabled={status === 'loading'} className="w-full bg-gradient-to-r from-blue-600 to-teal-500 hover:from-blue-500 hover:to-teal-400 text-white py-5 rounded-2xl font-bold text-xl transition-all shadow-lg hover:shadow-blue-900/50 flex justify-center items-center gap-3">
            {status === 'loading' ? <div className="w-6 h-6 border-4 border-white/30 border-t-white rounded-full animate-spin"></div> : t.sendBooking}
          </button>
        </form>
      );
    }

    // --- STREAMING_CHUNK:Driver Login System ---

            <form onSubmit={handleLogin} className="space-y-6">
              <div className="relative">
                 <User className="absolute right-5 top-1/2 transform -translate-y-1/2 text-gray-500" size={22} />
                 <input required type="text" placeholder={t.username} value={username} onChange={e => setUsername(e.target.value)} className="w-full p-4 pr-14 text-lg rounded-xl bg-gray-900 border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-white" dir="ltr" />

              <div className="relative">

              <button type="submit" disabled={loading} className="w-full bg-white text-gray-900 hover:bg-gray-200 py-4 rounded-xl font-bold text-xl transition-all mt-8 flex justify-center items-center gap-2 shadow-lg">
                {loading ? <div className="w-6 h-6 border-4 border-gray-900 border-t-transparent rounded-full animate-spin"></div> : t.login}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // --- STREAMING_CHUNK:Driver Dashboard (Manifest Form) ---
    function DriverDashboard({ t, user, onManifestCreated }) {
      const [loading, setLoading] = useState(false);
      const [data, setData] = useState({
        bookingNum: Math.floor(Math.random() * 10000).toString(),
        driverPhone: '', driverId: '', driverName: user ? user.name : '',
        carPlate: '', carColor: '', carType: 'هيونداي ستاريا',
        from: 'مطار جدة', to: 'مكه المكرمه', flightNum: '',
        date: new Date().toISOString().split('T')[0], day: 'السبت',
        guestName: '',
        passengers: Array(12).fill({ nat: '', id: '', name: '' })
      });

      const updatePass = (index, field, value) => { const newP = [...data.passengers]; newP[index] = { ...newP[index], [field]: value }; setData({ ...data, passengers: newP }); };

      const handleSaveAndGenerate = async () => {
        setLoading(true);
        const cleanData = { ...data, passengers: data.passengers.filter(p => p.name.trim() !== '') };
        const res = await apiCall('saveManifest', { payload: cleanData });
        setLoading(false);

        if (res.success) {
          onManifestCreated({ id: res.manifestId, ...data });
        } else {
          alert("حدث خطأ أثناء الحفظ. تأكد من رابط سكريبت جوجل.");
        }
      };

      return (
        <div className="container mx-auto px-4 py-24 max-w-5xl">

              <InputGroup label="التاريخ" type="date" val={data.date} onChange={v => setData({...data, date: v})} />
              <InputGroup label="اليوم" val={data.day} onChange={v => setData({...data, day: v})} />
              <InputGroup label="جهة القدوم" val={data.from} onChange={v => setData({...data, from: v})} />
              <InputGroup label="جهة الوصول" val={data.to} onChange={v => setData({...data, to: v})} />
              <InputGroup label="رقم الرحلة" val={data.flightNum} onChange={v => setData({...data, flightNum: v})} />
              <div className="md:col-span-3"><InputGroup label="الضيف الأساسي (صاحب الحجز)" val={data.guestName} onChange={v => setData({...data, guestName: v})} /></div>

              <InputGroup label="اسم السائق" val={data.driverName} onChange={v => setData({...data, driverName: v})} />
              <InputGroup label="هوية السائق" val={data.driverId} onChange={v => setData({...data, driverId: v})} />
              <InputGroup label="جوال السائق" val={data.driverPhone} onChange={v => setData({...data, driverPhone: v})} />
              
              <div>
                 <label className="block text-sm font-bold mb-2 text-gray-300">نوع السيارة</label>
                 <select value={data.carType} onChange={e => setData({...data, carType: e.target.value})} className="w-full p-4 rounded-xl bg-gray-800 border border-gray-600 outline-none text-white">
                    <option value="هيونداي ستاريا">هيونداي ستاريا</option>

          </div>
        </div>
      );
