  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { QRCodeSVG } from 'qrcode.react';
    import { Moon, Sun, Globe, Phone, MapPin, Menu, X, Plus, Trash2, CheckCircle, Car, Users, Star, MessageCircle, FileText, ArrowRight, User, ShieldCheck, Clock, Award, ChevronDown } from 'lucide-react';

    // الرابط السري الخاص بجوجل سكريبت
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMt_PgL02L9D_J_E4dQ-IJ-dlxNT7ZfJzKS2JKBW0WrXXzPTgJF5ldzOaekHy6JlCcdA/exec";

    // دالة الاتصال بالخادم
    const apiCall = async (action, payload = {}) => {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...payload })
        });
        return await response.json();
      } catch (error) {
        console.error("API Error:", error);
        return { success: false, error: error.message };
      }
    };

    // مكون حركة الدخول الانسيابية
    function FadeInWhenVisible({ children, delay = 0, className = "" }) {
      const [isVisible, setIsVisible] = useState(false);
      const domRef = useRef();

      useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(domRef.current);
            }
          });
        }, { threshold: 0.1 });
        
        if (domRef.current) observer.observe(domRef.current);
        return () => { if (domRef.current) observer.unobserve(domRef.current); };
      }, []);

      return (
        <div
          ref={domRef}
          className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-16'} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    }

    // --- البيانات والمحتوى ---
    const dict = {
      ar: {
        title: 'المسار الآمن للنقل والرحلات', home: 'الرئيسية', fleet: 'أسطولنا', book: 'احجز رحلتك',
        driverLogin: 'بوابة السائقين', heroTitle: 'ارتقِ بتجربة سفرك نحو الفخامة',
        heroSub: 'أسطول من أحدث سيارات الـ SUV والفانات العائلية باللون الأسود الملكي. نضمن لك ولعائلتك رحلة آمنة، مريحة، ولا تُنسى.',
        bookNow: 'اكتشف الرحلة', ourFleet: 'أسطول النخبة', fleetSub: 'سيارات فاخرة مجهزة بأعلى معايير الراحة والأمان العالمي',
        passenger: 'مرافق', passengers: 'المرافقين', addPassenger: 'إضافة مرافق',
        customerName: 'الاسم الكامل للعميل', mobile: 'رقم الجوال', passport: 'رقم الهوية / الجواز',
        nationality: 'الجنسية', sendBooking: 'تأكيد الحجز الفاخر', bookingSuccess: 'تم استلام حجزك بنجاح! سيقوم فريقنا بالتواصل معك فوراً.',
        loginTitle: 'بوابة السائقين المعتمدين', username: 'اسم المستخدم', password: 'كلمة المرور', login: 'تسجيل الدخول',
        manifestTitle: 'إصدار كشف ركاب إلكتروني', driverName: 'اسم السائق', driverId: 'رقم الهوية',
        carPlate: 'رقم اللوحة', carColor: 'لون السيارة', carType: 'نوع السيارة',
        from: 'جهة القدوم', to: 'جهة الوصول', flightNum: 'رقم الرحلة', date: 'التاريخ', day: 'اليوم',

        contact: 'خدمة العملاء', saudi: 'سعودي', egyptian: 'مصري', other: 'أخرى', featuresTitle: 'لماذا المسار الآمن؟'
      }
    };

    // تم تغيير الصور لسيارات حقيقية فخمة (سوداء/كحلي داكن)
    const cars = [
      { id: 1, name: 'هيونداي ستاريا (7 مقاعد)', descAr: 'فخامة واتساع لا مثيل له، مقاعد مريحة كدرجة رجال الأعمال. (أسود ملكي)', img: 'https://www.hyundai.com/content/dam/hyundai/template_en/en/images/find-a-car/pip/staria/highlights/staria-us4-highlights-premium-pc.jpg' },
      { id: 2, name: 'جي إم سي يوكون (GMC)', descAr: 'هيبة الحضور وقوة الأداء، الخيار الأمثل للعائلات الباحثة عن الرفاهية والأمان. (أسود لامع)', img: 'https://media.drive.com.au/obj/tx_q:50,rs:auto:1920:1080:1/driveau/upload/cms/uploads/kkqagsuh1ivsekrobyyn' },
      { id: 3, name: 'فورد تورنيو كاستم', descAr: 'مرونة عالية ومساحة تخزين ضخمة، مصممة خصيصاً لرحلات المطار الطويلة. (كحلي داكن)', img: 'https://www.gmc.com/content/dam/gmc/na/us/english/index/vehicles/2026/suvs/yukon/overview/capability/v2/my26-yukon-mov-capability-adaptive-suspension-1280x720-26PGYK100928.jpg?imwidth=1920' },
      { id: 4, name: 'هيونداي ستاريا (9 مقاعد)', descAr: 'النسخة الأكبر للعائلات الممتدة، رحابة داخلية مذهلة للرحلات الطويلة. (رمادي داكن)', img: 'https://parkers-images.bauersecure.com/wp-images/245473/082-ford-tourneo-custom-front-static.jpg' },
    ];

    const features = [
      { icon: <ShieldCheck size={36} />, titleAr: 'أمان لا يساوم', descAr: 'أسطولنا مجهز بأحدث أنظمة السلامة الذكية لحمايتك في كل ميل.' },
      { icon: <Clock size={36} />, titleAr: 'دقة المواعيد', descAr: 'نقدر وقتك. سائقونا متواجدون قبل الموعد المحدد لضمان انطلاقك بسلاسة.' },
      { icon: <Award size={36} />, titleAr: 'خدمة كبار الشخصيات', descAr: 'تجربة سفر متكاملة تبدأ من لحظة استقبالك وحتى وصولك لوجهتك.' },
    ];

    const reviews = [
      { id: 1, name: 'أحمد محمود', rating: 5, text: 'تعامل راقي جداً وسيارات هيونداي ستاريا جديدة ومريحة للغاية. السائق كان في الموعد بالضبط.' },
      { id: 2, name: 'سارة خالد', rating: 5, text: 'رحلتنا من جدة لمكة كانت ممتازة. سيارة GMC واسعة وتكفي العائلة كلها مع الشنط الكبيرة براحة.' },
      { id: 3, name: 'محمد عبدالسلام', rating: 5, text: 'خدمة عملاء سريعة الرد وحجز سهل. تجربة السفر في الفورد تورنيو كانت مريحة جداً.' },
      { id: 4, name: 'فهد العتيبي', rating: 5, text: 'السائق محترم جداً والقيادة آمنة. أفضل شركة تعاملت معاها لنقل المطار.' },
    ];

    // --- STREAMING_CHUNK: Main App ---
    function App() {
      // Default to dark mode for a luxury feel
      const [theme, setTheme] = useState('dark');
      const [currentPage, setCurrentPage] = useState('home');
      const [user, setUser] = useState(null);
      const [viewedManifestData, setViewedManifestData] = useState(null);

      const t = dict['ar']; // Forced Arabic as per requirement

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const manifestId = params.get('manifest');
        if (manifestId) fetchManifest(manifestId);
      }, []);

      useEffect(() => {
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        }
      }, [theme]);

      const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

      const fetchManifest = async (id) => {
        const res = await apiCall('getManifest', { manifestId: id });
        if (res.success) {
          setViewedManifestData({ id, ...res.payload });
          setCurrentPage('view-manifest');
        } else {
          alert('الكشف غير موجود أو تم حذفه.');
          setCurrentPage('home');
        }
      };

      const navTo = (page) => {
        try { window.history.replaceState({}, '', window.location.pathname); } catch (e) {}
        setViewedManifestData(null);
        setCurrentPage(page);
        window.scrollTo(0, 0);
      };

      return (
        <div className={`min-h-screen font-arabic selection:bg-brand-500 selection:text-white`}>
          <div className="print:hidden">
            <Navbar t={t} theme={theme} toggleTheme={toggleTheme} navTo={navTo} currentPage={currentPage} />
          </div>

          <main className="print:p-0 print:m-0">
            {currentPage === 'home' && <Home t={t} navTo={navTo} theme={theme} />}
            {currentPage === 'driver-login' && <DriverLogin t={t} onLogin={(driverName) => { setUser({ name: driverName }); navTo('driver-dashboard'); }} />}
            {currentPage === 'driver-dashboard' && <DriverDashboard t={t} user={user} onManifestCreated={(data) => {
              setViewedManifestData(data);
              setCurrentPage('view-manifest');
            }} />}
            {currentPage === 'view-manifest' && viewedManifestData && (
              <ManifestView t={t} data={viewedManifestData} onBack={() => navTo('driver-dashboard')} />
            )}
          </main>

          <div className="print:hidden">
            {currentPage !== 'view-manifest' && <Footer t={t} />}
            <WhatsAppButton />
          </div>
        </div>
      );
    }

    // --- STREAMING_CHUNK: Navbar ---
    function Navbar({ t, theme, toggleTheme, navTo, currentPage }) {

      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollToSection = (id) => { 
        navTo('home'); 
        setTimeout(() => { 
          const el = document.getElementById(id); 
          if (el) el.scrollIntoView({ behavior: 'smooth' }); 
        }, 100); 
      };

      const glassClass = theme === 'dark' ? 'glass-dark' : 'glass-light';
      const navClass = `fixed w-full z-50 transition-all duration-500 ${scrolled ? glassClass + ' py-2' : 'bg-transparent py-4'}`;

      return (
        <nav className={navClass}>
          <div className="container mx-auto px-6 flex justify-between items-center">
            {/* Logo */}
            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => navTo('home')}>
              <div className="w-12 h-12 rounded-xl bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-brand-500/30 group-hover:rotate-12 transition-transform duration-300">
                M
              </div>
              <span className={`font-black text-2xl tracking-tight transition-colors ${scrolled || theme === 'light' ? 'text-gray-900 dark:text-white' : 'text-white'}`}>
                المسار <span className="text-brand-500">الآمن</span>
              </span>
            </div>

            {/* Desktop Links */}
            <div className="hidden md:flex items-center gap-8">
              <button onClick={() => navTo('home')} className={`font-bold hover:text-brand-500 transition-colors ${currentPage === 'home' ? 'text-brand-500' : (scrolled || theme==='light' ? 'text-gray-700 dark:text-gray-300' : 'text-gray-100')}`}>{t.home}</button>
              <button onClick={() => scrollToSection('fleet')} className={`font-bold hover:text-brand-500 transition-colors ${(scrolled || theme==='light') ? 'text-gray-700 dark:text-gray-300' : 'text-gray-100'}`}>{t.fleet}</button>
              <button onClick={() => scrollToSection('book')} className={`font-bold hover:text-brand-500 transition-colors ${(scrolled || theme==='light') ? 'text-gray-700 dark:text-gray-300' : 'text-gray-100'}`}>{t.book}</button>
              
              <div className="flex items-center gap-4 border-r border-gray-300 dark:border-gray-700 pr-4">
                {/* THEME TOGGLE BUTTON - FIXED */}
                <button 
                  onClick={toggleTheme} 
                  className={`p-2.5 rounded-full backdrop-blur-md transition-all hover:scale-110 ${scrolled || theme==='light' ? 'bg-gray-200 dark:bg-gray-800 text-gray-800 dark:text-yellow-400' : 'bg-white/10 text-yellow-400 hover:bg-white/20'}`}
                  title="تغيير المظهر"
                >
                  {theme === 'dark' ? <Sun size={20} className="animate-spin-slow" /> : <Moon size={20} />}
                </button>

                <button onClick={() => navTo('driver-login')} className="px-6 py-2.5 rounded-full bg-brand-600 hover:bg-brand-500 text-white transition-all shadow-[0_0_20px_rgba(14,165,233,0.3)] hover:shadow-[0_0_25px_rgba(14,165,233,0.6)] hover:-translate-y-1 font-bold flex items-center gap-2">
                  <Car size={18} /> {t.driverLogin}
                </button>

            {/* Mobile Toggle */}

                {theme === 'dark' ? <Sun size={24} /> : <Moon size={24} />}

              <button onClick={() => setIsOpen(!isOpen)} className={scrolled || theme==='light' ? 'text-gray-900 dark:text-white' : 'text-white'}>
                {isOpen ? <X size={28} /> : <Menu size={28} />}
              </button>
            </div>
          </div>

          {/* Mobile Menu */}
          {isOpen && (
            <div className={`md:hidden px-6 py-6 space-y-5 border-t mt-4 shadow-2xl ${theme === 'dark' ? 'bg-[#0B1120] border-gray-800' : 'bg-white border-gray-200'}`}>
               <button onClick={() => { navTo('home'); setIsOpen(false); }} className="block w-full text-start font-bold text-lg">{t.home}</button>
               <button onClick={() => { scrollToSection('fleet'); setIsOpen(false); }} className="block w-full text-start font-bold text-lg">{t.fleet}</button>
               <button onClick={() => { scrollToSection('book'); setIsOpen(false); }} className="block w-full text-start font-bold text-lg">{t.book}</button>
               <button onClick={() => { navTo('driver-login'); setIsOpen(false); }} className="block w-full text-start text-brand-500 font-bold text-lg pt-4 border-t border-gray-200 dark:border-gray-800">{t.driverLogin}</button>

    // --- STREAMING_CHUNK: Home Content ---
    function Home({ t, navTo, theme }) {
      const scrollToBook = () => { const el = document.getElementById('book'); if (el) el.scrollIntoView({ behavior: 'smooth' }); };
      
      return (
        <div className="flex flex-col">

                   الخيار الأول لكبار الشخصيات
                </div>
                <h1 className="text-5xl md:text-7xl lg:text-8xl font-black mb-6 text-white drop-shadow-2xl leading-[1.2]">
                  {t.heroTitle}
                </h1>
                <p className="text-lg md:text-2xl text-gray-300 mb-10 max-w-3xl mx-auto font-medium leading-relaxed opacity-90">

                </p>
                <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                  <button onClick={scrollToBook} className="w-full sm:w-auto inline-flex justify-center items-center gap-3 bg-brand-600 hover:bg-brand-500 text-white px-10 py-5 rounded-full text-xl font-bold transition-all shadow-[0_0_30px_rgba(14,165,233,0.5)] hover:shadow-[0_0_50px_rgba(14,165,233,0.8)] hover:-translate-y-1">

            </div>
            
            <div className="absolute bottom-16 left-1/2 transform -translate-x-1/2 text-white/50 animate-bounce cursor-pointer" onClick={() => { const el = document.getElementById('features'); if (el) el.scrollIntoView({ behavior: 'smooth' }); }}>
               <ChevronDown size={40} className="opacity-70 hover:opacity-100 transition-opacity text-brand-400" />

          {/* Features Section */}

                  <div className="text-center mb-16">
                     <h2 className="text-4xl md:text-5xl font-black text-gray-900 dark:text-white">{t.featuresTitle}</h2>

                  </div>

    // --- STREAMING_CHUNK: Booking Form Logic ---
    function BookingForm({ t, theme }) {
      const [status, setStatus] = useState('idle');
      const [formData, setFormData] = useState({ mainName: '', mobile: '', passengers: [{ name: '', passport: '', nationality: 'saudi' }] });

      const addPassenger = () => setFormData(p => ({ ...p, passengers: [...p.passengers, { name: '', passport: '', nationality: 'saudi' }] }));
      const removePassenger = (i) => formData.passengers.length > 1 && setFormData(p => ({ ...p, passengers: p.passengers.filter((_, idx) => idx !== i) }));
      const updatePassenger = (i, field, val) => { const newP = [...formData.passengers]; newP[i][field] = val; setFormData({ ...formData, passengers: newP }); };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setStatus('loading');
        
        const res = await apiCall('book', { payload: formData });
        
        if (res.success) {
          setStatus('success');
          setFormData({ mainName: '', mobile: '', passengers: [{ name: '', passport: '', nationality: 'saudi' }] });
          setTimeout(() => setStatus('idle'), 5000);
        } else {
          setStatus('error');
          alert('حدث خطأ أثناء الحجز، يرجى المحاولة لاحقاً وتأكد من رابط السكريبت');
        }
      };

      if (status === 'success') {
        return (
           <div className="flex flex-col items-center justify-center py-20 text-center animate-fade-in">
             <div className="w-32 h-32 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mb-8 border-4 border-green-500/30">
               <CheckCircle size={64} className="text-green-500" />
             </div>
             <h3 className="text-3xl md:text-4xl font-bold text-green-600 dark:text-green-400 mb-4">{t.bookingSuccess}</h3>
             <p className="text-gray-600 dark:text-gray-400 text-xl">سيتواصل معك فريق الحجوزات قريباً لترتيب أدق التفاصيل.</p>
           </div>
        );
      }

      const inputClass = "w-full p-4 md:p-5 text-lg rounded-2xl bg-gray-50 dark:bg-[#060B14] border border-gray-200 dark:border-gray-700 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20 outline-none transition-all text-gray-900 dark:text-white font-medium";
      const labelClass = "block text-sm font-bold mb-3 text-gray-700 dark:text-gray-300";

      return (
        <form onSubmit={handleSubmit} className="space-y-8 animate-fade-in">
          <div className="grid md:grid-cols-2 gap-8">
            <div>
               <label className={labelClass}>{t.customerName}</label>
               <input required type="text" value={formData.mainName} onChange={e => setFormData({...formData, mainName: e.target.value})} className={inputClass} placeholder="الاسم الكامل" />
            </div>
            <div>
               <label className={labelClass}>{t.mobile}</label>
               <input required type="tel" value={formData.mobile} onChange={e => setFormData({...formData, mobile: e.target.value})} className={inputClass} placeholder="05XXXXXXXX" dir="ltr" />
            </div>
          </div>
          
          <div className="bg-gray-50 dark:bg-[#060B14]/50 p-6 md:p-10 rounded-[2rem] border border-gray-200 dark:border-gray-800 shadow-inner">
            <div className="flex justify-between items-center mb-8 border-b border-gray-200 dark:border-gray-800 pb-6">
               <h4 className="font-bold text-2xl flex items-center gap-3 text-gray-900 dark:text-white"><Users size={28} className="text-brand-500"/> {t.passengers}</h4>
               <button type="button" onClick={addPassenger} className="text-sm bg-brand-100 dark:bg-brand-900/40 hover:bg-brand-200 dark:hover:bg-brand-800/60 text-brand-600 dark:text-brand-300 px-6 py-3 rounded-full flex items-center gap-2 transition-colors font-bold border border-brand-500/20">
                  <Plus size={20} /> {t.addPassenger}
               </button>
            </div>
            
            <div className="space-y-6">
               {formData.passengers.map((p, index) => (
                 <div key={index} className="grid grid-cols-1 md:grid-cols-12 gap-5 items-end bg-white dark:bg-[#0B1120] p-6 md:p-8 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm animate-slide-up">
                   <div className="md:col-span-4">
                     <label className="block text-sm font-bold mb-3 text-gray-600 dark:text-gray-400">{t.passenger} {index + 1}</label>
                     <input required type="text" placeholder="الاسم" value={p.name} onChange={e => updatePassenger(index, 'name', e.target.value)} className="w-full p-4 rounded-xl bg-gray-50 dark:bg-[#060B14] border border-gray-200 dark:border-gray-700 focus:border-brand-500 outline-none text-gray-900 dark:text-white" />
                   </div>
                   <div className="md:col-span-4">
                     <label className="block text-sm font-bold mb-3 text-gray-600 dark:text-gray-400">{t.passport}</label>
                     <input type="text" placeholder="رقم الهوية" value={p.passport} onChange={e => updatePassenger(index, 'passport', e.target.value)} className="w-full p-4 rounded-xl bg-gray-50 dark:bg-[#060B14] border border-gray-200 dark:border-gray-700 focus:border-brand-500 outline-none text-gray-900 dark:text-white" />
                   </div>
                   <div className="md:col-span-3">
                     <label className="block text-sm font-bold mb-3 text-gray-600 dark:text-gray-400">{t.nationality}</label>
                     <select value={p.nationality} onChange={e => updatePassenger(index, 'nationality', e.target.value)} className="w-full p-4 rounded-xl bg-gray-50 dark:bg-[#060B14] border border-gray-200 dark:border-gray-700 focus:border-brand-500 outline-none text-gray-900 dark:text-white font-bold">
                       <option value="saudi">{t.saudi}</option><option value="egyptian">{t.egyptian}</option><option value="other">{t.other}</option>
                     </select>
                   </div>
                   <div className="md:col-span-1 flex justify-center pb-2">
                     {formData.passengers.length > 1 && <button type="button" onClick={() => removePassenger(index)} className="p-4 text-red-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition-colors"><Trash2 size={24} /></button>}
                   </div>
                 </div>
               ))}
            </div>
          </div>
          
          <button type="submit" disabled={status === 'loading'} className="w-full bg-brand-600 hover:bg-brand-500 text-white py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover:shadow-brand-500/50 flex justify-center items-center gap-3 hover:-translate-y-1">
            {status === 'loading' ? <div className="w-8 h-8 border-4 border-white/30 border-t-white rounded-full animate-spin"></div> : t.sendBooking}
          </button>
        </form>
      );
    }
