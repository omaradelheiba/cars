    function App() {
      const [theme, setTheme] = useState('dark');
      const [lang, setLang] = useState('ar');
      const [currentPage, setCurrentPage] = useState('home');
      const [user, setUser] = useState(null);
      const [viewedManifestData, setViewedManifestData] = useState(null);

      const t = dict[lang];
      const isRTL = lang === 'ar';

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const manifestId = params.get('manifest');
        if (manifestId && user) {
          fetchManifest(manifestId);
        }
      }, [user]);

      useEffect(() => {
        document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.classList.toggle('light', theme === 'light');
        document.body.className = theme === 'dark' ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900';

        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              // هذا السطر مهم جداً ليعمل في GitHub Pages، تأكد من تفعيل Anonymous Auth في Firebase
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth Error:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();

      const toggleTheme = () => setTheme(theme === 'dark' ? 'light' : 'dark');
      const toggleLang = () => setLang(lang === 'ar' ? 'en' : 'ar');

      const fetchManifest = async (id) => {
        if (!user) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'manifests', id);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
            setViewedManifestData({ id, ...docSnap.data() });
            setCurrentPage('view-manifest');
          } else {
            alert('الكشف غير موجود أو تم حذفه.');
            setCurrentPage('home');
          }
        } catch (error) {
          console.error("Error fetching manifest:", error);
        }
      };

      const navTo = (page) => {
        try {
          const url = new URL(window.location.href);
          url.search = '';
          url.hash = '';
          window.history.replaceState({}, '', url.toString());
        } catch (error) {
          console.warn("History mod blocked");
        }
        setViewedManifestData(null);
        setCurrentPage(page);
        window.scrollTo(0, 0);
      };

            {currentPage === 'driver-dashboard' && <DriverDashboard t={t} user={user} onManifestCreated={(data) => {
              setViewedManifestData(data);
              setCurrentPage('view-manifest');

            {currentPage === 'view-manifest' && viewedManifestData && (

    function BookingForm({ t, db, user }) {
      const [status, setStatus] = useState('idle');
      const [formData, setFormData] = useState({
        mainName: '', mobile: '', passengers: [{ name: '', passport: '', nationality: 'saudi' }]
      });

      const addPassenger = () => setFormData(p => ({ ...p, passengers: [...p.passengers, { name: '', passport: '', nationality: 'saudi' }] }));
      const removePassenger = (i) => formData.passengers.length > 1 && setFormData(p => ({ ...p, passengers: p.passengers.filter((_, idx) => idx !== i) }));
      const updatePassenger = (i, field, val) => {
        const newP = [...formData.passengers];
        newP[i][field] = val;
        setFormData({ ...formData, passengers: newP });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!user) return;
        setStatus('loading');
        try {
          const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
          await addDoc(colRef, { ...formData, timestamp: serverTimestamp(), userId: user.uid });
          setStatus('success');
          setFormData({ mainName: '', mobile: '', passengers: [{ name: '', passport: '', nationality: 'saudi' }] });
          setTimeout(() => setStatus('idle'), 5000);
        } catch (error) {
          console.error(error);
          setStatus('error');
        }
      };
